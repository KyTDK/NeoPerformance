name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Build plugin
        run: mvn -U -B -ntp clean verify -DskipTests

      - name: Upload API artifact
        uses: actions/upload-artifact@v4
        with:
          name: NeoPerformance-jar
          path: api/target/NeoPerformance-*.jar
