name: Deploy To Pterodactyl

on:
  workflow_dispatch:
    inputs:
      server_uuid:
        description: "Pterodactyl server UUID (volume/container name)"
        required: true
        type: string
      plugin_filename:
        description: "Plugin filename in plugins folder"
        required: false
        default: "NeoPerformance.jar"
        type: string

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Build plugin jar
        run: mvn -B -ntp clean package -DskipTests

      - name: Select deployable jar
        run: |
          JAR_PATH="$(ls -1 api/target/NeoPerformance-*.jar | grep -v 'original-' | head -n 1)"
          if [ -z "$JAR_PATH" ]; then
            echo "Could not locate NeoPerformance jar in api/target"
            exit 1
          fi
          echo "JAR_PATH=$JAR_PATH" >> "$GITHUB_ENV"

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${SSH_PRIVATE_KEY}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${SSH_HOST}" >> ~/.ssh/known_hosts
        env:
          SSH_HOST: ${{ secrets.PTERO_SSH_HOST }}
          SSH_PRIVATE_KEY: ${{ secrets.PTERO_SSH_PRIVATE_KEY }}

      - name: Upload plugin jar
        run: |
          scp -i ~/.ssh/id_ed25519 "$JAR_PATH" "${SSH_USER}@${SSH_HOST}:/tmp/NeoPerformance.jar"
        env:
          SSH_HOST: ${{ secrets.PTERO_SSH_HOST }}
          SSH_USER: ${{ secrets.PTERO_SSH_USER }}

      - name: Install plugin and restart server
        run: |
          ssh -i ~/.ssh/id_ed25519 "${SSH_USER}@${SSH_HOST}" "
            set -e
            SERVER_UUID='${SERVER_UUID}'
            PLUGIN_FILENAME='${PLUGIN_FILENAME}'
            PLUGINS_DIR=\"/var/lib/pterodactyl/volumes/\${SERVER_UUID}/plugins\"
            mkdir -p \"\${PLUGINS_DIR}\"
            if [ -f \"\${PLUGINS_DIR}/\${PLUGIN_FILENAME}\" ]; then
              cp \"\${PLUGINS_DIR}/\${PLUGIN_FILENAME}\" \"\${PLUGINS_DIR}/\${PLUGIN_FILENAME}.prev\"
            fi
            cp /tmp/NeoPerformance.jar \"\${PLUGINS_DIR}/\${PLUGIN_FILENAME}\"
            chown pterodactyl:pterodactyl \"\${PLUGINS_DIR}/\${PLUGIN_FILENAME}\"
            rm -rf \"\${PLUGINS_DIR}/.paper-remapped\"/*
            docker restart \"\${SERVER_UUID}\"
            sleep 20
            docker logs \"\${SERVER_UUID}\" --since 2m | tail -n 200
          "
        env:
          SSH_HOST: ${{ secrets.PTERO_SSH_HOST }}
          SSH_USER: ${{ secrets.PTERO_SSH_USER }}
          SERVER_UUID: ${{ inputs.server_uuid }}
          PLUGIN_FILENAME: ${{ inputs.plugin_filename }}
