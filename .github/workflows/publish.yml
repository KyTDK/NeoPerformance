name: Publish

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Configure Maven settings.xml
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml <<'EOF'
          <settings xmlns="http://maven.apache.org/SETTINGS/1.0.0"
                    xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
                    xsi:schemaLocation="http://maven.apache.org/SETTINGS/1.0.0 https://maven.apache.org/xsd/settings-1.0.0.xsd">
            <servers>
              <server>
                <id>neomechanical-releases</id>
                <username>${env.NEXUS_USERNAME}</username>
                <password>${env.NEXUS_PASSWORD}</password>
              </server>
              <server>
                <id>neomechanical-snapshots</id>
                <username>${env.NEXUS_USERNAME}</username>
                <password>${env.NEXUS_PASSWORD}</password>
              </server>
            </servers>
          </settings>
          EOF
        env:
          NEXUS_USERNAME: ${{ secrets.NEXUS_USERNAME }}
          NEXUS_PASSWORD: ${{ secrets.NEXUS_PASSWORD }}

      - name: Resolve project version
        id: project_version
        run: |
          VERSION=$(mvn -q -DforceStdout help:evaluate -Dexpression=project.version | tail -n 1)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Validate release tag and version
        run: |
          VERSION="${{ steps.project_version.outputs.version }}"
          EXPECTED_TAG="v$VERSION"
          if [[ "$VERSION" == *-SNAPSHOT ]]; then
            echo "Release workflow cannot publish snapshot version: $VERSION" >&2
            exit 1
          fi
          if [ "${GITHUB_REF_NAME}" != "$EXPECTED_TAG" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match project.version $VERSION. Expected $EXPECTED_TAG." >&2
            exit 1
          fi

      - name: Check whether release already exists
        id: release_state
        run: |
          VERSION="${{ steps.project_version.outputs.version }}"
          ARTIFACT_URL="https://hub.neomechanical.com/repository/maven-releases/com/neomechanical/NeoPerformance-parent/$VERSION/NeoPerformance-parent-$VERSION.pom"
          STATUS=$(curl -sS -o /dev/null -w "%{http_code}" -u "$NEXUS_USERNAME:$NEXUS_PASSWORD" "$ARTIFACT_URL")
          if [ "$STATUS" = "200" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Release $VERSION already exists in Nexus. Skipping deploy."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Release $VERSION is not present in Nexus yet."
          fi
        env:
          NEXUS_USERNAME: ${{ secrets.NEXUS_USERNAME }}
          NEXUS_PASSWORD: ${{ secrets.NEXUS_PASSWORD }}

      - name: Deploy artifact
        if: steps.release_state.outputs.exists != 'true'
        run: mvn -U -B -ntp deploy -DskipTests --settings ~/.m2/settings.xml
        env:
          NEXUS_USERNAME: ${{ secrets.NEXUS_USERNAME }}
          NEXUS_PASSWORD: ${{ secrets.NEXUS_PASSWORD }}
