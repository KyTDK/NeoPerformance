# NeoPerformance release obfuscation (ProGuard).
# Build: mvn -pl api package   Skip: mvn -pl api package -Dproguard.skip=true
# Keep proguard-mapping.txt from target/ for deobfuscating production stack traces (treat as secret).

-dontoptimize
-dontnote
-ignorewarnings

-keepattributes *Annotation*,Signature,InnerClasses,EnclosingMethod,Exceptions,Record

# Bukkit entry point (name must match plugin.yml)
-keep public class com.neomechanical.neoperformance.NeoPerformance extends org.bukkit.plugin.java.JavaPlugin {
    public <init>();
}
-keepclassmembers class * extends org.bukkit.plugin.java.JavaPlugin {
    public void onEnable();
    public void onDisable();
}

# Event bus invokes listener methods by name
-keepclassmembers class * implements org.bukkit.event.Listener {
    @org.bukkit.event.EventHandler <methods>;
}

# Shaded dependencies: keep stable (reflection, NeoUtils/NeoConfig contracts, third-party bytecode)
-keep class com.neomechanical.neoperformance.neoutils.** { *; }
-keep class com.neomechanical.neoperformance.neoconfig.** { *; }
-keep class com.neomechanical.neoperformance.bukkit.** { *; }
-keep class com.neomechanical.neoperformance.charts.** { *; }
-keep class javax.** { *; }
-keep class com.sun.mail.** { *; }
-keep class com.sun.activation.** { *; }

-allowaccessmodification
